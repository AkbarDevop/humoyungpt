<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>humoyungpt · chat with humoyun</title>
<meta name="description" content="chat with an ai version of khumoyun nasipkulov, grounded in his public writing, portfolio, and education work.">
<link rel="icon" href="/favicon.svg" type="image/svg+xml">
<meta name="theme-color" content="#f5f1e9" media="(prefers-color-scheme: light)">
<meta name="theme-color" content="#111722" media="(prefers-color-scheme: dark)">
<meta property="og:title" content="humoyungpt · chat with humoyun">
<meta property="og:description" content="chat with an ai version of humoyun, built from public context.">
<meta property="og:type" content="website">
<meta property="og:image" content="/assets/profile.jpg">
<style>
  :root {
    --bg: #f5f1e9;
    --fg: #26303d;
    --muted: #6f7480;
    --line: #ddd2c1;
    --card: #ece4d6;
    --accent: #c69433;
    --accent-ink: #26303d;
    --link: #8d6827;
    --sans: Inter, -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
    --serif: "Iowan Old Style", "Palatino Linotype", Georgia, serif;
    --mono: ui-monospace, "SF Mono", Menlo, Consolas, monospace;
  }

  :root[data-theme="dark"] {
    --bg: #111722;
    --fg: #efe9dd;
    --muted: #aaa394;
    --line: #2f3741;
    --card: #1b2430;
    --accent: #d6a64b;
    --accent-ink: #141923;
    --link: #d6a64b;
  }

  @media (prefers-color-scheme: dark) {
    :root:not([data-theme]) {
      --bg: #111722;
      --fg: #efe9dd;
      --muted: #aaa394;
      --line: #2f3741;
      --card: #1b2430;
      --accent: #d6a64b;
      --accent-ink: #141923;
      --link: #d6a64b;
    }
  }

  * {
    box-sizing: border-box;
    margin: 0;
    padding: 0;
    letter-spacing: 0;
  }

  html {
    -webkit-font-smoothing: antialiased;
    min-height: 100%;
  }

  body {
    min-height: 100vh;
    background: var(--bg);
    color: var(--fg);
    font-family: var(--sans);
    font-size: 17px;
    line-height: 1.65;
    padding: 0 24px;
    transition: background .25s ease, color .25s ease;
  }

  a {
    color: inherit;
    text-decoration: none;
  }

  button,
  textarea {
    font: inherit;
  }

  .wrap {
    max-width: 660px;
    min-height: 100vh;
    margin: 0 auto;
    padding: 80px 0 40px;
    display: flex;
    flex-direction: column;
  }

  .topline {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 14px;
  }

  .back {
    align-self: flex-start;
    color: var(--muted);
    border-bottom: 1px solid var(--line);
    font-family: var(--mono);
    font-size: 13px;
  }

  .back:hover,
  .back:focus-visible {
    color: var(--accent);
    border-color: var(--accent);
    outline: none;
  }

  .public-links {
    display: flex;
    align-items: center;
    gap: 10px;
    color: var(--muted);
    font-family: var(--mono);
    font-size: 12px;
    white-space: nowrap;
  }

  .public-links a {
    border-bottom: 1px solid var(--line);
  }

  .public-links a:hover,
  .public-links a:focus-visible {
    color: var(--accent);
    border-color: var(--accent);
    outline: none;
  }

  h1 {
    margin: 26px 0 8px;
    font-family: var(--serif);
    font-size: 31px;
    line-height: 1.1;
    font-weight: 600;
  }

  .sub {
    max-width: 58ch;
    margin-bottom: 26px;
    color: var(--muted);
    font-size: 15px;
    line-height: 1.5;
  }

  #theme {
    position: fixed;
    top: 22px;
    right: 22px;
    width: 38px;
    height: 38px;
    border: 1px solid var(--line);
    border-radius: 50%;
    background: var(--card);
    color: var(--muted);
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 15px;
    transition: transform .18s ease, border-color .18s ease, color .18s ease;
  }

  #theme:hover,
  #theme:focus-visible {
    color: var(--accent);
    border-color: var(--accent);
    transform: rotate(20deg);
    outline: none;
  }

  #log {
    flex: 1;
    display: flex;
    flex-direction: column;
    gap: 18px;
    margin-bottom: 20px;
  }

  .msg {
    max-width: 90%;
    line-height: 1.6;
    animation: rise .2s ease both;
  }

  .msg .who {
    margin-bottom: 5px;
    color: var(--muted);
    font-family: var(--mono);
    font-size: 11px;
    letter-spacing: .12em;
    text-transform: uppercase;
  }

  .msg.you {
    align-self: flex-end;
    text-align: right;
  }

  .msg.you .bubble {
    display: inline-block;
    padding: 9px 14px;
    border: 1px solid var(--line);
    border-radius: 12px 12px 4px 12px;
    background: var(--card);
    text-align: left;
  }

  .msg.bot .bubble {
    white-space: pre-wrap;
  }

  .msg.bot .bubble a {
    color: var(--fg);
    border-bottom: 1px solid var(--accent);
  }

  .cursor {
    display: inline-block;
    width: 7px;
    height: 15px;
    margin-left: 1px;
    vertical-align: text-bottom;
    background: var(--accent);
    animation: blink 1s step-end infinite;
  }

  .chips {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    margin-bottom: 18px;
  }

  .chip {
    padding: 6px 12px;
    border: 1px solid var(--line);
    border-radius: 20px;
    background: none;
    color: var(--muted);
    cursor: pointer;
    font-size: 13px;
    transition: border-color .15s ease, color .15s ease, transform .15s ease;
  }

  .chip:hover,
  .chip:focus-visible {
    color: var(--accent);
    border-color: var(--accent);
    transform: translateY(-1px);
    outline: none;
  }

  form {
    position: sticky;
    bottom: 0;
    display: flex;
    align-items: flex-end;
    gap: 10px;
    padding: 14px 0 24px;
    background: var(--bg);
  }

  textarea {
    flex: 1;
    max-height: 140px;
    padding: 11px 14px;
    resize: none;
    overflow-y: hidden;
    border: 1px solid var(--line);
    border-radius: 12px;
    background: var(--card);
    color: var(--fg);
    outline: none;
    font-size: 16px;
    line-height: 1.5;
  }

  textarea:focus {
    border-color: var(--accent);
  }

  button.send {
    padding: 11px 18px;
    border: none;
    border-radius: 12px;
    background: var(--accent);
    color: var(--accent-ink);
    cursor: pointer;
    font-size: 15px;
    font-weight: 600;
    transition: opacity .15s ease, transform .15s ease;
  }

  button.send:hover,
  button.send:focus-visible {
    transform: translateY(-1px);
    outline: none;
  }

  button.send:disabled {
    opacity: .45;
    cursor: default;
    transform: none;
  }

  .foot {
    padding-bottom: 20px;
    color: var(--muted);
    text-align: center;
    font-family: var(--mono);
    font-size: 11px;
  }

  .foot a {
    border-bottom: 1px solid var(--link);
  }

  @keyframes blink {
    50% { opacity: 0; }
  }

  @keyframes rise {
    from { opacity: 0; transform: translateY(5px); }
    to { opacity: 1; transform: translateY(0); }
  }

  @media (max-width: 560px) {
    body {
      padding: 0 18px;
    }

    .wrap {
      padding: 52px 0 20px;
    }

    .topline {
      align-items: flex-start;
    }

    .public-links {
      gap: 8px;
      white-space: normal;
      justify-content: flex-end;
      text-align: right;
    }

    #theme {
      top: 14px;
      right: 14px;
      width: 34px;
      height: 34px;
    }

    h1 {
      font-size: 29px;
    }

    .msg {
      max-width: 100%;
    }

    form {
      padding-bottom: 18px;
    }
  }
</style>
</head>
<body>
<button id="theme" aria-label="toggle theme">☾</button>
<div class="wrap">
  <div class="topline">
    <a class="back" href="https://www.humoyun.com/" target="_blank" rel="noopener">khumoyun nasipkulov</a>
    <div class="public-links" aria-label="public links">
      <a href="https://t.me/humoyun_com" target="_blank" rel="noopener">telegram</a>
      <a href="https://t.me/naseeb_edu" target="_blank" rel="noopener">naseeb</a>
      <a href="https://www.linkedin.com/in/khumoyun-nasipkulov" target="_blank" rel="noopener">linkedin</a>
    </div>
  </div>

  <h1>humoyungpt</h1>
  <p class="sub">an ai version of humoyun, grounded in his public portfolio, telegram posts, and education work. ask about hkust, scholarships, hong kong, math, or naseeb edu.</p>

  <div class="chips" id="chips"></div>
  <div id="log"></div>

  <form id="form">
    <textarea id="input" rows="1" placeholder="ask humoyun something..." autocomplete="off"></textarea>
    <button class="send" id="send" type="submit">send</button>
  </form>
  <div class="foot">humoyungpt can get things wrong. the real humoyun is on <a href="https://t.me/humoyun_com" target="_blank" rel="noopener">telegram</a>.</div>
</div>

<script>
  const root = document.documentElement;
  const theme = document.getElementById("theme");
  const savedTheme = localStorage.getItem("theme");
  if (savedTheme) root.setAttribute("data-theme", savedTheme);

  function syncTheme() {
    const current = root.getAttribute("data-theme") ||
      (matchMedia("(prefers-color-scheme: dark)").matches ? "dark" : "light");
    theme.textContent = current === "dark" ? "☀" : "☾";
  }
  syncTheme();
  theme.addEventListener("click", () => {
    const current = root.getAttribute("data-theme") ||
      (matchMedia("(prefers-color-scheme: dark)").matches ? "dark" : "light");
    const next = current === "dark" ? "light" : "dark";
    root.setAttribute("data-theme", next);
    localStorage.setItem("theme", next);
    syncTheme();
  });

  const log = document.getElementById("log");
  const form = document.getElementById("form");
  const input = document.getElementById("input");
  const send = document.getElementById("send");
  const chips = document.getElementById("chips");
  const history = [];
  let busy = false;

  const prompts = [
    "how did you get to hkust?",
    "what is naseeb edu?",
    "give me advice for scholarships",
    "why is hong kong special for you?",
    "how should i prepare for sat math?",
    "what should uzbek students do earlier?",
    "what did you learn from disney?",
    "how do meaningful connections help?",
    "nima uchun hkust?",
    "grant olish uchun nimadan boshlay?"
  ];

  function shuffle(items) {
    const copy = items.slice();
    for (let i = copy.length - 1; i > 0; i -= 1) {
      const j = Math.floor(Math.random() * (i + 1));
      [copy[i], copy[j]] = [copy[j], copy[i]];
    }
    return copy;
  }

  function renderChips() {
    chips.innerHTML = "";
    for (const text of shuffle(prompts).slice(0, 3)) {
      const button = document.createElement("button");
      button.className = "chip";
      button.type = "button";
      button.textContent = text;
      chips.appendChild(button);
    }
  }
  renderChips();

  function escapeHtml(text) {
    return text
      .replace(/&/g, "&amp;")
      .replace(/</g, "&lt;")
      .replace(/>/g, "&gt;");
  }

  function label(url) {
    const clean = url.replace(/^https?:\/\//, "").replace(/^www\./, "");
    if (clean.includes("linkedin.com")) return "linkedin";
    if (clean.includes("t.me/humoyun_com")) return "telegram";
    if (clean.includes("t.me/naseeb_edu")) return "naseeb";
    if (clean.includes("humoyun.com")) return "humoyun.com";
    if (clean.includes("youtube.com")) return "youtube";
    return clean.replace(/\/$/, "");
  }

  const combined = /\[([^\]]+)\]\((https?:\/\/[^\s)]+|mailto:[^\s)]+)\)|(https?:\/\/[^\s<),]+)|([a-z0-9._%+-]+@[a-z0-9.-]+\.[a-z]{2,})|((?:[a-z0-9-]+\.)+(?:com|one|me|ai|app|org|io|dev|net|xyz|uz)(?:\/[^\s<),]*)?)/gi;

  function renderText(text) {
    let html = escapeHtml(text);
    html = html.replace(/\s*[—–]\s*/g, ", ");
    html = html.replace(combined, (match, mdLabel, mdUrl, url, email, domain) => {
      if (mdUrl) return `<a href="${mdUrl}" target="_blank" rel="noopener">${mdLabel}</a>`;
      if (url) {
        const trailing = url.match(/[.,!?;:]+$/);
        const clean = trailing ? url.slice(0, -trailing[0].length) : url;
        return `<a href="${clean}" target="_blank" rel="noopener">${label(clean)}</a>${trailing ? trailing[0] : ""}`;
      }
      if (email) return `<a href="mailto:${email}">${email}</a>`;
      if (domain) {
        const trailing = domain.match(/[.,!?;:]+$/);
        const clean = trailing ? domain.slice(0, -trailing[0].length) : domain;
        return `<a href="https://${clean}" target="_blank" rel="noopener">${label(clean)}</a>${trailing ? trailing[0] : ""}`;
      }
      return match;
    });
    return html;
  }

  function nearBottom() {
    return window.innerHeight + window.scrollY >= document.body.scrollHeight - 140;
  }

  function toBottom(smooth) {
    window.scrollTo({ top: document.body.scrollHeight, behavior: smooth ? "smooth" : "auto" });
  }

  function addMessage(labelText, cls, text = "") {
    const message = document.createElement("div");
    message.className = "msg " + cls;
    message.innerHTML = `<div class="who">${labelText}</div><div class="bubble"></div>`;
    log.appendChild(message);
    const bubble = message.querySelector(".bubble");
    if (text) bubble.textContent = text;
    toBottom(true);
    return bubble;
  }

  function fitInput() {
    input.style.height = "auto";
    const height = Math.min(input.scrollHeight, 140);
    input.style.height = height + "px";
    input.style.overflowY = input.scrollHeight > 140 ? "auto" : "hidden";
  }

  input.addEventListener("input", fitInput);
  input.addEventListener("keydown", (event) => {
    if (event.key === "Enter" && !event.shiftKey) {
      event.preventDefault();
      form.requestSubmit();
    }
  });

  chips.addEventListener("click", (event) => {
    if (busy || !event.target.classList.contains("chip")) return;
    input.value = event.target.textContent;
    fitInput();
    form.requestSubmit();
  });

  form.addEventListener("submit", async (event) => {
    event.preventDefault();
    const text = input.value.trim();
    if (!text || busy) return;

    busy = true;
    send.disabled = true;
    chips.style.display = "none";
    addMessage("you", "you", text);
    history.push({ role: "user", content: text });
    input.value = "";
    fitInput();

    const bubble = addMessage("humoyun", "bot");
    bubble.innerHTML = '<span class="cursor"></span>';
    let accumulated = "";

    try {
      const response = await fetch("/api/humoyungpt", {
        method: "POST",
        headers: { "content-type": "application/json" },
        body: JSON.stringify({ messages: history })
      });

      if (!response.ok || !response.body) {
        let error = "something glitched on my side. try again in a second.";
        try {
          const data = await response.json();
          if (data.error) error = data.error;
        } catch {}
        bubble.textContent = error;
        history.pop();
        return;
      }

      const reader = response.body.getReader();
      const decoder = new TextDecoder();
      while (true) {
        const { value, done } = await reader.read();
        if (done) break;
        const stick = nearBottom();
        accumulated += decoder.decode(value, { stream: true });
        bubble.innerHTML = renderText(accumulated) + '<span class="cursor"></span>';
        if (stick) toBottom(false);
      }

      bubble.innerHTML = renderText(accumulated || "(no response)");
      if (accumulated) history.push({ role: "assistant", content: accumulated });
    } catch {
      bubble.textContent = "network hiccup. try again.";
      history.pop();
    } finally {
      busy = false;
      send.disabled = false;
      input.focus();
    }
  });
</script>
</body>
</html>

[build]
  command = "npm run build"
  publish = "dist"

[dev]
  command = "./node_modules/.bin/vite --host :: --port 8080"
  targetPort = 8080

[functions]
  directory = "netlify/functions"
  node_bundler = "esbuild"

[[redirects]]
  from = "/api/humoyungpt"
  to = "/.netlify/functions/humoyungpt"
  status = 200

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
